name: Glosso
options:
  bundleIdPrefix: com.mirek
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "F266Z8F83B"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    ENABLE_HARDENED_RUNTIME: YES
targets:
  Glosso:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Generated/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Glosso
    entitlements:
      path: Generated/Glosso.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mirek.glosso
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - GlossoTests
      gatherCoverageData: true
  GlossoTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: TestsIntegration
    dependencies:
      - target: Glosso
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mirek.glosso.tests
        GENERATE_INFOPLIST_FILE: YES
