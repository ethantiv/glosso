name: Glosso
options:
  bundleIdPrefix: com.mirek
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.5.2"
    CURRENT_PROJECT_VERSION: "1"
    # Stable self-signed identity (created once in Keychain): keeps the app's code
    # signing identity constant across releases so the Accessibility (TCC) grant
    # survives manual updates. Not notarized — fine for personal/free distribution.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Glosso Self-Signed"
    CODE_SIGN_INJECT_BASE_ENTITLEMENTS: YES
    # Xcode's Debug "debug dylib" is signed without a Team ID; the xctest runner
    # refuses to load it under library validation, crashing the test host. Disabling
    # the split puts everything back in the main binary. Debug-only mechanism.
    ENABLE_DEBUG_DYLIB: NO
  configs:
    Debug:
      # Hardened runtime turns on Library Validation, which rejects our self-signed
      # (no Team ID) test bundle. We don't notarize, so it's only needed on the
      # shipped Release build — off in Debug so the unit-test bundle loads.
      ENABLE_HARDENED_RUNTIME: NO
    Release:
      ENABLE_HARDENED_RUNTIME: YES
targets:
  Glosso:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Generated/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Glosso
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
    entitlements:
      path: Generated/Glosso.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mirek.glosso
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - GlossoTests
      gatherCoverageData: true
  GlossoTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: TestsIntegration
    dependencies:
      - target: Glosso
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mirek.glosso.tests
        GENERATE_INFOPLIST_FILE: YES
